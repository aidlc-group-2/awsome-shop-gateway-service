# Docker Environment Configuration
# 容器化部署环境配置（已对齐统一部署契约：端口 8081 + DB_* + awsome_shop_gateway）
# 路由与下游地址：容器网络内用「服务名:8081」（各服务 docker profile 统一监听 8081）

server:
  port: 8081

# Gateway backend service URLs（容器网络地址）
gateway:
  services:
    auth: http://auth-service:8081
    product: http://product-service:8081
    point: http://points-service:8081
    order: http://order-service:8081
  auth:
    validate-url: http://auth-service:8081/api/v1/internal/auth/validate
  security:
    admin-paths:
      - /api/v1/auth/user/detail
      - /api/v1/auth/user/role
      - /api/v1/admin/**
      - /api/v1/**/admin/**
    rate-limit:
      enabled: true
      capacity: 100
      refill-tokens: 100
      refill-period-seconds: 1

spring:
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      database: 0

  # 数据源配置
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:awsome_shop_gateway}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 10
      min-idle: 5
      max-active: 50
      max-wait: 60000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      stat-view-servlet:
        enabled: false

  # Spring Cloud Gateway 路由（uri 引用上面的 gateway.services.*）
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # ---------- API Docs ----------
            - id: auth-docs
              uri: ${gateway.services.auth}
              predicates:
                - Path=/v3/api-docs/auth
              filters:
                - RewritePath=/v3/api-docs/auth, /v3/api-docs
                - SwaggerServersRewrite
              metadata:
                auth-required: false
            - id: product-docs
              uri: ${gateway.services.product}
              predicates:
                - Path=/v3/api-docs/product
              filters:
                - RewritePath=/v3/api-docs/product, /v3/api-docs
                - SwaggerServersRewrite
              metadata:
                auth-required: false
            - id: point-docs
              uri: ${gateway.services.point}
              predicates:
                - Path=/v3/api-docs/point
              filters:
                - RewritePath=/v3/api-docs/point, /v3/api-docs
                - SwaggerServersRewrite
              metadata:
                auth-required: false
            - id: order-docs
              uri: ${gateway.services.order}
              predicates:
                - Path=/v3/api-docs/order
              filters:
                - RewritePath=/v3/api-docs/order, /v3/api-docs
                - SwaggerServersRewrite
              metadata:
                auth-required: false
            # ---------- Public Routes (no auth) ----------
            - id: auth-public
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/public/auth/**
              metadata:
                auth-required: false
            - id: product-public
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/public/product/**
              metadata:
                auth-required: false
            - id: point-public
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/public/point/**
              metadata:
                auth-required: false
            - id: order-public
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/public/order/**
              metadata:
                auth-required: false
            # ---------- Protected Routes (auth required) ----------
            - id: auth-protected
              uri: ${gateway.services.auth}
              predicates:
                - Path=/api/v1/auth/**
              metadata:
                auth-required: true
            - id: product-protected
              uri: ${gateway.services.product}
              predicates:
                - Path=/api/v1/product/**
              metadata:
                auth-required: true
            - id: point-protected
              uri: ${gateway.services.point}
              predicates:
                - Path=/api/v1/point/**
              metadata:
                auth-required: true
            - id: order-protected
              uri: ${gateway.services.order}
              predicates:
                - Path=/api/v1/order/**
              metadata:
                auth-required: true
            # ---------- Service-Prefix Routes ----------
            - id: auth-proxy
              uri: ${gateway.services.auth}
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
              metadata:
                auth-required: false
            - id: product-proxy
              uri: ${gateway.services.product}
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1
              metadata:
                auth-required: false
            - id: point-proxy
              uri: ${gateway.services.point}
              predicates:
                - Path=/point/**
              filters:
                - StripPrefix=1
              metadata:
                auth-required: false
            - id: order-proxy
              uri: ${gateway.services.order}
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1
              metadata:
                auth-required: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      banner: false

# Security 配置（JWT 校验）
security:
  jwt:
    secret: ${JWT_SECRET:docker-secret-key-for-jwt-token-must-be-at-least-256-bits-long-for-hmac-sha256}
    expiration: ${JWT_EXPIRATION:7200}
    issuer: awsome-shop-gateway-service
  login:
    max-failed-attempts: 5
    lock-duration: 1800

# Shop 配置
shop:
  security:
    encryption:
      key: ${ENCRYPTION_KEY:dockerEncryptionKey1234567890ab}

# SpringDoc - Swagger 聚合
springdoc:
  swagger-ui:
    urls:
      - name: auth
        url: /v3/api-docs/auth
      - name: product
        url: /v3/api-docs/product
      - name: point
        url: /v3/api-docs/point
      - name: order
        url: /v3/api-docs/order

# 日志配置
logging:
  level:
    root: INFO
    com.awsome: INFO
