# Local Development Environment Configuration
#
# 路由、后端服务地址、admin-paths、validate-url、限流等已统一下沉到 application.yml
# （通过环境变量覆盖，默认 localhost），所有环境共用。本文件仅保留 local 特有项。

server:
  port: 8080

# SpringDoc - Swagger aggregation for all backend services
springdoc:
  swagger-ui:
    urls:
      - name: auth
        url: /v3/api-docs/auth
      - name: product
        url: /v3/api-docs/product
      - name: point
        url: /v3/api-docs/point
      - name: order
        url: /v3/api-docs/order
